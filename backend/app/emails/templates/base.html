<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title</title>
</head>
<body bgcolor="#F3F6F1" style="background-color:#F3F6F1; margin:0; padding:0; font-family:Arial, Helvetica, sans-serif; color:#1B2B22;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#F3F6F1" style="background-color:#F3F6F1; border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" bgcolor="#FFFFFF" style="width:600px; background-color:#FFFFFF; border-collapse:collapse; border:1px solid #D9E2D5;">
          <tr>
            <td bgcolor="#005030" style="background-color:#005030; padding:0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
                <tr>
                  <td style="padding:24px 28px 16px 28px;">
                    <img src="cid:$logo_cid" width="240" alt="Banco Mercantil Santa Cruz" style="display:block; width:240px; height:auto; border:0; outline:none; text-decoration:none;">
                  </td>
                </tr>
                <tr>
                  <td style="padding:0 28px 24px 28px;">
                    <div style="font-size:22px; line-height:28px; font-weight:bold; color:#FFFFFF;">$brand_name</div>
                    <div style="font-size:14px; line-height:20px; color:#E8D39A; padding-top:6px;">$title</div>
                  </td>
                </tr>
                <tr>
                  <td height="5" bgcolor="#D4A843" style="height:5px; line-height:5px; background-color:#D4A843; font-size:1px;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:30px 28px 28px 28px;">
              $content
            </td>
          </tr>
          <tr>
            <td bgcolor="#0A1A10" style="background-color:#0A1A10; padding:20px 28px; border-top:4px solid #8B1E47;">
              <div style="font-size:12px; line-height:18px; color:#D7E2D4; text-align:center;">
                Este mensaje fue generado automáticamente por $brand_name. No respondas a este correo.
              </div>
              <div style="font-size:11px; line-height:16px; color:#8FAB98; text-align:center; padding-top:6px;">
                Banco Mercantil Santa Cruz
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
