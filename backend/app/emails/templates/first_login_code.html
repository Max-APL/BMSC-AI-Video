<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
  <tr>
    <td style="font-size:16px; line-height:24px; color:#1B2B22; padding:0 0 14px 0;">
      Hola, <strong>$username</strong>.
    </td>
  </tr>
  <tr>
    <td style="font-size:15px; line-height:23px; color:#33483B; padding:0 0 18px 0;">
      Este es tu código de verificación para completar el cambio de contraseña en $brand_name.
    </td>
  </tr>
  <tr>
    <td align="center" style="padding:4px 0 18px 0;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" bgcolor="#005030" style="background-color:#005030; border-collapse:collapse;">
        <tr>
          <td align="center" style="padding:14px 28px; font-size:28px; line-height:34px; font-weight:bold; font-family:Consolas, 'Courier New', monospace; color:#FFFFFF;">$code</td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td align="center" style="font-size:14px; line-height:22px; color:#33483B; padding:0 0 18px 0;">
      El código expirará en $expires_minutes minutos.
    </td>
  </tr>
  <tr>
    <td bgcolor="#FFF8E4" style="background-color:#FFF8E4; border-left:4px solid #D4A843; padding:12px 14px; font-size:13px; line-height:20px; color:#5F4615;">
      <strong>Importante:</strong> no compartas este código con nadie. Ningún administrador te solicitará este código.
    </td>
  </tr>
</table>
